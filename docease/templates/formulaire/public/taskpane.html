<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocEase - Outlook</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-family: 'Segoe UI', sans-serif;
      color: #aa4584; font-size: 14px;
    }
    .spinner {
      width: 24px; height: 24px; border: 3px solid #f3f3f3;
      border-top: 3px solid #aa4584; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe {
      width: 100%; height: 100vh; border: none; display: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    Chargement de DocEase...
  </div>
  <iframe id="app" src="/"></iframe>
  <script>
    Office.onReady(function(info) {
      console.log('DocEase Outlook Add-in ready', info.host, info.platform);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    });
  </script>
</body>
</html>
