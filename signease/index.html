    <!-- ⏱️ DIAGNOSTIC PERF - point de départ -->
    <script>window.__PERF={t0:performance.now(),marks:[]};window.__PERF.mark=function(n){var t=performance.now();this.marks.push({name:n,time:t,delta:t-this.t0});console.log('⏱️ '+n+': '+(t-this.t0).toFixed(0)+'ms');};</script>

    <script>window.__PERF.mark('avant-app-js');</script>

    <!-- Tailwind CSS CDN chargé APRÈS le JS principal pour ne pas bloquer le rendu initial -->

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "sans-serif"],
            },
            colors: {
              primary: "#B71C1C",
              onPrimary: "#FFFFFF",
              primaryContainer: "#FFDAD4",
              onPrimaryContainer: "#410001",
              secondary: "#775651",
              onSecondary: "#FFFFFF",
              secondaryContainer: "#FFDAD4",
              onSecondaryContainer: "#2C1512",
              tertiary: "#705C2E",
              onTertiary: "#FFFFFF",
              tertiaryContainer: "#FBDFA6",
              onTertiaryContainer: "#251A00",
              error: "#BA1A1A",
              onError: "#FFFFFF",
              errorContainer: "#FFDAD6",
              onErrorContainer: "#410002",
              background: "#FFFBFF",
              onBackground: "#201A19",
              surface: "#FFFBFF",
              onSurface: "#201A19",
              surfaceVariant: "#F5DDDA",
              onSurfaceVariant: "#534341",
              outline: "#857370",
              outlineVariant: "#D8C2BF",
              shadow: "#000000",
              scrim: "#000000",
              inverseSurface: "#362F2E",
              inverseOnSurface: "#FBEEEC",
              inversePrimary: "#FFB4A8",
            },
            borderRadius: {

              "2xl": "16px",
              "3xl": "24px",
            },
          },
        },
      };
    </script>
    
    <!-- Enregistrement du Service Worker pour PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('✅ ServiceWorker enregistré:', registration.scope);
              
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('🔄 Nouvelle version disponible');
                  }
                });
              });
            })
            .catch((error) => {
              console.error('❌ Erreur ServiceWorker:', error);
            });
        });
      }
      
      window.addEventListener('appinstalled', () => {
        console.log('📱 SignEase a été installé!');
      });
      
      // beforeinstallprompt est géré par InstallPWAButton.tsx
      // Ne PAS intercepter ici pour éviter le warning Chrome
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        window.__PERF.mark('DOMContentLoaded');
      });
      window.addEventListener('load', function() {
        window.__PERF.mark('window-load');
        // Résumé final
        setTimeout(function() {
          console.log('\n📊 === RÉSUMÉ PERF SIGNEASE ===');
          window.__PERF.marks.forEach(function(m) {
            var bar = '█'.repeat(Math.min(Math.round(m.delta/100), 30));
            console.log(bar + ' ' + m.name + ': ' + m.delta.toFixed(0) + 'ms');
          });
          // Navigation Timing
          var nav = performance.getEntriesByType('navigation')[0];
          if (nav) {
            console.log('\n🌐 === NETWORK TIMING ===');
            console.log('DNS: ' + (nav.domainLookupEnd - nav.domainLookupStart).toFixed(0) + 'ms');
            console.log('TCP: ' + (nav.connectEnd - nav.connectStart).toFixed(0) + 'ms');
            console.log('TLS: ' + (nav.secureConnectionStart > 0 ? (nav.connectEnd - nav.secureConnectionStart).toFixed(0) : '0') + 'ms');
            console.log('TTFB: ' + (nav.responseStart - nav.requestStart).toFixed(0) + 'ms');
            console.log('Download HTML: ' + (nav.responseEnd - nav.responseStart).toFixed(0) + 'ms');
            console.log('DOM Interactive: ' + nav.domInteractive.toFixed(0) + 'ms');
            console.log('DOM Complete: ' + nav.domComplete.toFixed(0) + 'ms');
            console.log('Load Event: ' + nav.loadEventEnd.toFixed(0) + 'ms');
          }
          // Resources lentes
          var res = performance.getEntriesByType('resource');
          var slow = res.filter(function(r) { return r.duration > 200; }).sort(function(a,b) { return b.duration - a.duration; });
          if (slow.length > 0) {
            console.log('\n🐌 === RESSOURCES LENTES (>200ms) ===');
            slow.forEach(function(r) {
              var name = r.name.split('/').pop().substring(0, 50);
              var size = r.transferSize ? (r.transferSize/1024).toFixed(0) + 'kB' : '(cache)';
              console.log(r.duration.toFixed(0) + 'ms  ' + size + '  ' + name);
            });
          }
          console.log('📊 === FIN RÉSUMÉ ===\n');
        }, 500);
      });
    </script>
